id: aws-sa
name: AWS Solutions Architect
version: "1.0"

domain: cloud

description: AWS Solutions Architect learning path

skill_catalog: aws-skills.yaml
resource_catalog: aws-resources.yaml

difficulty: beginner
estimated_duration: 12 weeks

tags:
  - aws
  - cloud

goal_template:
  title: Become an AWS Solutions Architect
  description: Learn the core AWS services and pass the certification exam.
  success_criteria:
    - Complete all milestones
    - Build hands-on projects
    - Pass practice exams

milestones:

  - id: aws-fundamentals
    title: AWS Fundamentals
    description: Learn the basic concepts of AWS Cloud.

    skill_ids:
      - cloud-basics
      - aws-global-infrastructure
      - shared-responsibility

    resource_ids:
      - aws-docs
      - aws-skill-builder

    exercise_ids:
      - aws-fundamentals-lab

     

    completion:
      method: manual
      required: true

  - id: iam
    title: Identity and Access Management
    
    description: Learn IAM users, groups, roles, and policies.

    depends_on:
      - aws-fundamentals

    skill_ids:
      - iam-users
      - iam-policies

    resource_ids:
      - aws-docs
      - aws-skill-builder

    exercise_ids:
      - iam-lab

    

    completion:
      method: manual
      required: true

  - id: ec2
    title: Amazon EC2
    description: Learn how to launch and manage EC2 instances.

    depends_on:
      - iam

    skill_ids:
      - ec2-basics
      - ec2-networking

    resource_ids:
      - aws-docs
      - aws-skill-builder

    exercise_ids:
      - ec2-lab
    
   

    completion:
      method: manual
      required: true

  - id: s3
    title: Amazon S3
    description: Learn object storage with Amazon S3.

    depends_on:
      - ec2

    skill_ids:
      - s3-buckets
      - s3-security

    resource_ids:
      - aws-docs
      - aws-skill-builder

    exercise_ids:
      - s3-lab

    

    completion:
      method: manual
      required: true

  - id: vpc
    title: Amazon VPC
    description: Learn AWS networking with VPC.

    depends_on:
      - s3

    skill_ids:
      - subnets
      - route-tables
      - security-groups

    resource_ids:
      - aws-docs
      - aws-skill-builder

    exercise_ids:
      - vpc-lab

    

    completion:
      method: manual
      required: true